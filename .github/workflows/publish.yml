name: publish

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    # 仅当 test.yml 由 v* 标签触发时才启动 publish。
    # 注意：workflow_run 没有 tags 过滤器，但 tag 推送时 head_branch的值就是 tag 名，所以这里 branches: ["v*"] 实际上过滤的是 tag。
    # 避免每次 push / PR 都产生一个被跳过的 publish run 污染日志。
    branches: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        required: true
        default: "none"
        type: choice
        options:
          - PYPI
          - test PYPI
          - none

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Resolve publish target
        id: resolve
        run: |
          TARGET=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.publish_target }}"
            if [ "$INPUT" = "PYPI" ]; then
              TARGET="pypi"
            elif [ "$INPUT" = "test PYPI" ]; then
              TARGET="testpypi"
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TARGET="pypi"
          fi

          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

          if [ -z "$TARGET" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no target)
        if: steps.resolve.outputs.skip == 'true'
        run: echo "No publish target, skipping"

      - name: Install dependencies
        if: steps.resolve.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install .[all] build twine

      - name: Run tests
        if: steps.resolve.outputs.skip == 'false'
        run: pytest tests/ -v --tb=short --junitxml=report.xml

      - name: Report test results
        if: steps.resolve.outputs.skip == 'false'
        uses: dorny/test-reporter@v1
        with:
          name: publish-test-results
          path: report.xml
          reporter: java-junit

      - name: Build
        if: steps.resolve.outputs.skip == 'false'
        run: python -m build

      - name: Publish to PyPI
        if: steps.resolve.outputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          repository-url: https://upload.pypi.org/legacy/

      - name: Publish to TestPyPI
        if: steps.resolve.outputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
